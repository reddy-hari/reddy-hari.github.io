        subtitle: Your University
        date: 2018 – 2022
        description:
          - Relevant coursework, honors, or thesis.
          - GPA / distinctions if you want them here.

  - title: Experience
    type: timeline
    items:
      - title: Software Engineer
        subtitle: Company Name
        date: 2022 – Present
        description:
          - Led / built / shipped something impactful.
          - Quantified result — improved X by Y%.
      - title: Software Engineering Intern
        subtitle: Earlier Company
        date: Summer 2021
        description:
          - What you worked on.

  - title: Projects
    type: timeline
    items:
      - title: Project Name
        subtitle: Tech stack
        date: 2023
        description:
          - What it does and why it matters.

  - title: Skills
    type: tags
    items:
